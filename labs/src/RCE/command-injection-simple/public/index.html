<!DOCTYPE html>
<html lang="ru">

<head>
   <meta charset="UTF-8">
   <title>Проверка остатков | Command Injection Lab</title>
   <style>
      body {
         font-family: 'Courier New', Courier, monospace;
         background-color: #2c3e50;
         color: #ecf0f1;
         max-width: 800px;
         margin: 40px auto;
         padding: 20px;
      }

      .terminal {
         background-color: #1a252f;
         padding: 30px;
         border-radius: 8px;
         box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
         border: 1px solid #34495e;
      }

      h2 {
         color: #3498db;
         margin-top: 0;
         border-bottom: 2px solid #34495e;
         padding-bottom: 10px;
      }

      .control-panel {
         margin-bottom: 25px;
         padding: 20px;
         background: #2c3e50;
         border-radius: 5px;
         border: 1px solid #34495e;
      }

      h3 {
         color: #95a5a6;
         margin-top: 0;
      }

      p {
         color: #7f8c8d;
      }

      select.dark-input {
         width: 100%;
         padding: 12px;
         margin-top: 10px;
         background-color: #1a252f;
         border: 1px solid #34495e;
         color: #ecf0f1;
         border-radius: 4px;
         font-family: 'Courier New', Courier, monospace;
         font-size: 14px;
      }

      select.dark-input:focus {
         outline: none;
         border-color: #3498db;
      }

      button.dark-btn {
         width: 100%;
         margin-top: 15px;
         padding: 12px;
         background: #1a252f;
         color: #3498db;
         border-radius: 4px;
         font-weight: bold;
         border: 1px solid #34495e;
         transition: 0.3s;
         cursor: pointer;
         font-family: 'Courier New', Courier, monospace;
         font-size: 16px;
      }

      button.dark-btn:hover {
         background: #3498db;
         color: white;
      }

      .result-box {
         margin-top: 20px;
         padding: 15px;
         border-radius: 4px;
         font-weight: bold;
         background-color: #000;
         border-left: 5px solid #2ecc71;
         color: #2ecc71;
         white-space: pre-wrap;
         font-family: monospace;
      }

      .result-box.error-box {
         border-left: 5px solid #e74c3c;
         color: #e74c3c;
         background-color: rgba(231, 76, 60, 0.1);
      }

      .help-text {
         font-size: 12px;
         color: #7f8c8d;
         margin-top: 30px;
         text-align: right;
      }
   </style>
</head>

<body>
   <div class="terminal">
      <h2>[Система складского учета]</h2>

      <div class="control-panel">
         <h3>> Товар: Super Gadget 3000</h3>
         <p>> Выберите склад для проверки доступности:</p>

         <select id="storeId" class="dark-input">
            <option value="1">Almaty (Main Warehouse)</option>
            <option value="2">Astana (Hub)</option>
            <option value="3">Shymkent (Local)</option>
         </select>

         <button class="dark-btn" onclick="checkStock()">> Инициировать проверку</button>
      </div>

      <div id="output" class="result-box" style="display: none;"></div>

      <div class="help-text">
         * Для диагностики складов используется внутренняя системная утилита.
      </div>
   </div>

   <script>
      async function checkStock() {
         const storeId = document.getElementById('storeId').value;
         const outputDiv = document.getElementById('output');

         outputDiv.style.display = 'block';
         outputDiv.className = 'result-box'; // Сбрасываем класс ошибки, если был
         outputDiv.innerText = '> Установка соединения со складом...';

         try {
            const response = await fetch('/api/stock', {
               method: 'POST',
               headers: { 'Content-Type': 'application/json' },
               body: JSON.stringify({ productId: 1, storeId: storeId })
            });
            const data = await response.json();

            // Имитация вывода консоли
            outputDiv.innerText = '> Вывод системы:\n' + data.result;
         } catch (e) {
            outputDiv.className = 'result-box error-box';
            outputDiv.innerText = '> СИСТЕМНАЯ ОШИБКА: Ошибка соединения с сервером.';
         }
      }
   </script>
</body>

</html>
