<!DOCTYPE html>
<html lang="ru">

<head>
   <meta charset="UTF-8">
   <title>Просмотр логов | Path Traversal Lab</title>
   <style>
      body {
         font-family: 'Courier New', Courier, monospace;
         background-color: #2c3e50;
         color: #ecf0f1;
         max-width: 800px;
         margin: 40px auto;
         padding: 20px;
      }

      .terminal {
         background-color: #1a252f;
         padding: 30px;
         border-radius: 8px;
         box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
         border: 1px solid #34495e;
      }

      h2 {
         color: #3498db;
         margin-top: 0;
         border-bottom: 2px solid #34495e;
         padding-bottom: 10px;
      }

      .control-panel {
         margin-bottom: 25px;
         padding: 20px;
         background: #2c3e50;
         border-radius: 5px;
         border: 1px solid #34495e;
      }

      h3 {
         color: #95a5a6;
         margin-top: 0;
      }

      p {
         color: #7f8c8d;
      }

      select.dark-input {
         width: 100%;
         padding: 12px;
         margin-top: 10px;
         background-color: #1a252f;
         border: 1px solid #34495e;
         color: #ecf0f1;
         border-radius: 4px;
         font-family: 'Courier New', Courier, monospace;
         font-size: 14px;
         box-sizing: border-box;
      }

      select.dark-input:focus {
         outline: none;
         border-color: #3498db;
      }

      button.dark-btn {
         width: 100%;
         margin-top: 15px;
         padding: 12px;
         background: #1a252f;
         color: #3498db;
         border-radius: 4px;
         font-weight: bold;
         border: 1px solid #34495e;
         transition: 0.3s;
         cursor: pointer;
         font-family: 'Courier New', Courier, monospace;
         font-size: 16px;
      }

      button.dark-btn:hover {
         background: #3498db;
         color: white;
      }

      .result-box {
         margin-top: 20px;
         padding: 15px;
         border-radius: 4px;
         font-weight: bold;
         background-color: #000;
         border-left: 5px solid #2ecc71;
         color: #2ecc71;
         white-space: pre-wrap;
         font-family: monospace;
         max-height: 400px;
         overflow-y: auto;
      }

      .help-text {
         font-size: 12px;
         color: #7f8c8d;
         margin-top: 30px;
         text-align: right;
      }
   </style>
</head>

<body>
   <div class="terminal">
      <h2>[Система мониторинга серверов]</h2>

      <div class="control-panel">
         <h3>> Модуль чтения журналов (Logs)</h3>
         <p>> Выберите файл журнала для анализа:</p>

         <select id="logFile" class="dark-input">
            <option value="access.log">access.log (Веб-трафик)</option>
            <option value="error.log">error.log (Системные ошибки)</option>
         </select>

         <button class="dark-btn" onclick="viewLog()">> Прочитать файл</button>
      </div>

      <div id="output" class="result-box" style="display: none;"></div>

      <div class="help-text">
         * Доступ к файловой системе ограничен директорией /var/www/html/logs/
      </div>
   </div>

   <script>
      async function viewLog() {
         const filename = document.getElementById('logFile').value;
         const outputDiv = document.getElementById('output');

         outputDiv.style.display = 'block';
         outputDiv.innerText = '> Загрузка файла...';

         try {
            // Отправляем GET-запрос с именем файла в параметре
            const response = await fetch(`/api/view?file=${filename}`);
            const text = await response.text();
            outputDiv.innerText = text;
         } catch (e) {
            outputDiv.innerText = '> СИСТЕМНАЯ ОШИБКА: Сбой чтения.';
         }
      }
   </script>
</body>

</html>
