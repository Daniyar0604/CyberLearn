<!DOCTYPE html>
<html lang="ru">

<head>
   <meta charset="UTF-8">
   <title>Генератор бейджей v2 | SSTI Bypass</title>
   <style>
      body {
         font-family: 'Courier New', Courier, monospace;
         background-color: #2c3e50;
         color: #ecf0f1;
         max-width: 800px;
         margin: 40px auto;
         padding: 20px;
      }

      .terminal {
         background-color: #1a252f;
         padding: 30px;
         border-radius: 8px;
         box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
         border: 1px solid #34495e;
      }

      h2 {
         color: #3498db;
         margin-top: 0;
         border-bottom: 2px solid #34495e;
         padding-bottom: 10px;
      }

      .control-panel {
         margin-bottom: 25px;
         padding: 20px;
         background: #2c3e50;
         border-radius: 5px;
         border: 1px solid #34495e;
      }

      h3 {
         color: #95a5a6;
         margin-top: 0;
      }

      p {
         color: #7f8c8d;
      }

      input.dark-input {
         width: 100%;
         padding: 12px;
         margin-top: 10px;
         background-color: #1a252f;
         border: 1px solid #34495e;
         color: #ecf0f1;
         border-radius: 4px;
         font-family: 'Courier New', Courier, monospace;
         font-size: 14px;
         box-sizing: border-box;
      }

      input.dark-input:focus {
         outline: none;
         border-color: #3498db;
      }

      button.dark-btn {
         width: 100%;
         margin-top: 15px;
         padding: 12px;
         background: #1a252f;
         color: #3498db;
         border-radius: 4px;
         font-weight: bold;
         border: 1px solid #34495e;
         transition: 0.3s;
         cursor: pointer;
         font-family: 'Courier New', Courier, monospace;
         font-size: 16px;
      }

      button.dark-btn:hover {
         background: #3498db;
         color: white;
      }

      .result-box {
         margin-top: 20px;
         padding: 15px;
         border-radius: 4px;
         font-weight: bold;
         background-color: #000;
         border-left: 5px solid #e74c3c;
         color: #e74c3c;
         white-space: pre-wrap;
         font-family: monospace;
         overflow-wrap: anywhere;
      }

      .help-text {
         font-size: 12px;
         color: #e74c3c;
         margin-top: 30px;
         text-align: right;
      }
   </style>
</head>

<body>
   <div class="terminal">
      <h2>[Корпоративный портал - Модуль приветствия v2]</h2>
      <div class="control-panel">
         <h3>> Генерация профиля (Защищенная версия)</h3>
         <p>> Введите ваше имя:</p>
         <input type="text" id="nameInput" class="dark-input" placeholder="Adilet">
         <button class="dark-btn" onclick="generateBadge()">> Сгенерировать</button>
      </div>
      <div id="output" class="result-box" style="display: none;"></div>
      <div class="help-text">
         * Внимание: Подключен Web Application Firewall. Использование системных команд (process, exec и т.д.) строго
         отслеживается.
      </div>
   </div>

   <script>
      async function generateBadge() {
         const name = document.getElementById('nameInput').value;
         const outputDiv = document.getElementById('output');

         outputDiv.style.display = 'block';
         outputDiv.innerHTML = '> Обработка...';

         try {
            const response = await fetch(`/api/greet?name=${encodeURIComponent(name)}`);
            const html = await response.text();
            outputDiv.innerHTML = html;
         } catch (e) {
            outputDiv.innerHTML = '> СИСТЕМНАЯ ОШИБКА.';
         }
      }
   </script>
</body>

</html>
